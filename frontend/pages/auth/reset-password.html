<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiGest — Nueva contraseña</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--color-bg-secondary); }
    .login-card { width:100%; max-width:380px; background:var(--color-bg); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:2rem; }
    .login-logo { display:flex; align-items:center; gap:8px; font-size:20px; font-weight:600; margin-bottom:2rem; }
    .login-logo .logo-dot { width:10px; height:10px; border-radius:50%; background:var(--color-accent); }
    .login-title { font-size:16px; font-weight:600; margin-bottom:1.5rem; }
    .form-stack { display:flex; flex-direction:column; gap:1rem; }
    .error-msg { font-size:13px; padding:10px 12px; border-radius:var(--radius-md); display:none; }
    .error-msg.error { background:var(--estado-cancelado-bg); color:var(--estado-cancelado-text); }
    .error-msg.ok { background:var(--estado-activo-bg,#e6f4ea); color:var(--estado-activo-text,#1a6b3a); }
    .btn-block { width:100%; justify-content:center; }
    .back-link { text-align:center; margin-top:1rem; font-size:13px; }
    .back-link a { color:var(--color-accent); cursor:pointer; font-weight:500; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="logo-dot"></div>
    ServiGest
  </div>

  <!-- Estado: token inválido -->
  <div id="view-invalid" style="display:none; text-align:center; padding:1rem 0">
    <div style="font-size:36px;margin-bottom:1rem">🔗</div>
    <p style="font-size:14px;color:var(--color-text-muted)">Este enlace ya no es válido o ha expirado.<br>Solicita uno nuevo desde la pantalla de inicio de sesión.</p>
    <a href="login.html" class="btn btn-primary btn-block" style="margin-top:1.5rem;display:inline-block;text-align:center;text-decoration:none">Ir al inicio de sesión</a>
  </div>

  <!-- Formulario nueva contraseña -->
  <div id="view-form">
    <p class="login-title">Establecer nueva contraseña</p>
    <div class="form-stack">
      <div id="reset-error" class="error-msg error"></div>
      <div id="reset-ok"    class="error-msg ok"></div>
      <div class="form-group">
        <label class="form-label" for="new-password">Nueva contraseña</label>
        <input class="form-input" type="password" id="new-password" placeholder="Mínimo 8 caracteres" />
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirmar contraseña</label>
        <input class="form-input" type="password" id="confirm-password" placeholder="Repite la contraseña" />
      </div>
      <button class="btn btn-primary btn-block" id="btn-reset">Guardar contraseña</button>
    </div>
    <div class="back-link"><a href="login.html">← Volver al inicio de sesión</a></div>
  </div>

  <!-- Estado: éxito -->
  <div id="view-success" style="display:none; text-align:center; padding:1rem 0">
    <div style="font-size:36px;margin-bottom:1rem">✅</div>
    <p style="font-size:15px;font-weight:600;margin:0 0 .5rem">Contraseña actualizada</p>
    <p style="font-size:13px;color:var(--color-text-muted);margin:0 0 1.5rem">Ya puedes iniciar sesión con tu nueva contraseña.</p>
    <a href="login.html" class="btn btn-primary btn-block" style="display:inline-block;text-align:center;text-decoration:none">Iniciar sesión</a>
  </div>
</div>

<script src="../../js/config.js"></script>
<script src="../../js/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    document.getElementById('view-form').style.display    = 'none';
    document.getElementById('view-invalid').style.display = 'block';
  }

  function showError(msg) {
    const el = document.getElementById('reset-error');
    el.textContent   = msg;
    el.style.display = 'block';
    document.getElementById('reset-ok').style.display = 'none';
  }

  document.getElementById('btn-reset').addEventListener('click', async () => {
    const pass    = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;

    document.getElementById('reset-error').style.display = 'none';

    if (pass.length < 8) return showError('La contraseña debe tener al menos 8 caracteres.');
    if (pass !== confirm) return showError('Las contraseñas no coinciden.');

    try {
      await api.resetPassword(token, pass);
      document.getElementById('view-form').style.display    = 'none';
      document.getElementById('view-success').style.display = 'block';
    } catch (err) {
      if (err.message.includes('nválido') || err.message.includes('expirado') || err.message.includes('expiró') || err.message.includes('Enlace')) {
        document.getElementById('view-form').style.display    = 'none';
        document.getElementById('view-invalid').style.display = 'block';
      } else {
        showError(err.message);
      }
    }
  });

  document.querySelectorAll('.form-input').forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-reset').click();
    });
  });
</script>
</body>
</html>
