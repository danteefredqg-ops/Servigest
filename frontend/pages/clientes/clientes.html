<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiGest — Clientes</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/components.css" />
</head>
<body>

<div class="layout">
    <aside class="sidebar">
    <div class="logo"><div class="logo-dot"></div>ServiGest</div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-user">
      <div class="user-avatar">--</div>
      <div><div class="user-name">Cargando...</div><div class="user-empresa"></div></div>
    </div>
    <button id="btn-logout" class="btn btn-ghost btn-sm" style="margin-top:8px">Cerrar sesión</button>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Clientes</h1>
        <p class="page-subtitle">Directorio de clientes de tu empresa</p>
      </div>
      <div style="display:flex;gap:.5rem">
        <a class="btn btn-secondary" href="../importar/importar.html">↑ Importar Excel</a>
        <button class="btn btn-primary" id="btn-nuevo">+ Nuevo cliente</button>
      </div>
    </div>

    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>RFC</th>
              <th>Teléfono</th>
              <th>Correo</th>
              <th>Pedidos</th>
              <th>Total facturado</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tabla-clientes">
            <tr><td colspan="7" style="text-align:center;color:var(--color-text-muted);padding:2rem">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal cliente -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-titulo">Nuevo cliente</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-cliente')">✕</button>
    </div>
    <input type="hidden" id="cliente-id" />
    <div style="display:flex;flex-direction:column;gap:1rem">
      <div class="form-group">
        <label class="form-label">Nombre / Razón Social *</label>
        <input class="form-input" type="text" id="c-nombre" placeholder="Roberto López" />
      </div>

      <div style="border-top:1px solid var(--color-border);padding-top:.75rem;margin-top:.25rem">
        <p style="font-size:11px;font-weight:600;color:var(--color-text-hint);text-transform:uppercase;letter-spacing:.5px;margin:0 0 .75rem">Datos para facturación CFDI</p>
        <div style="display:flex;flex-direction:column;gap:.75rem">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
            <div class="form-group" style="margin:0">
              <label class="form-label">RFC</label>
              <input class="form-input" type="text" id="c-rfc" placeholder="ROBR800101AAA" maxlength="13" style="text-transform:uppercase" />
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">C.P. Fiscal</label>
              <input class="form-input" type="text" id="c-cp" placeholder="64000" maxlength="10" />
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
            <div class="form-group" style="margin:0">
              <label class="form-label">Régimen Fiscal</label>
              <select class="form-select" id="c-regimen">
                <option value="">— Sin especificar —</option>
                <option value="601">601 – General Personas Morales</option>
                <option value="603">603 – Personas Morales s/f de lucro</option>
                <option value="605">605 – Sueldos y Salarios</option>
                <option value="606">606 – Arrendamiento</option>
                <option value="612">612 – Act. Empresariales y Prof.</option>
                <option value="616">616 – Sin obligaciones fiscales</option>
                <option value="621">621 – Incorporación Fiscal</option>
                <option value="626">626 – RESICO</option>
              </select>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Uso CFDI</label>
              <select class="form-select" id="c-uso-cfdi">
                <option value="G03">G03 – Gastos en general</option>
                <option value="G01">G01 – Adquisición de mercancias</option>
                <option value="G02">G02 – Devoluciones, descuentos</option>
                <option value="I01">I01 – Construcciones</option>
                <option value="D01">D01 – Honorarios médicos</option>
                <option value="S01">S01 – Sin efectos fiscales</option>
                <option value="P01">P01 – Por definir</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input class="form-input" type="tel" id="c-telefono" placeholder="81 1234 5678" />
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input class="form-input" type="email" id="c-email" placeholder="cliente@correo.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Dirección</label>
        <textarea class="form-textarea" id="c-direccion" placeholder="Calle, colonia, ciudad"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Notas internas</label>
        <textarea class="form-textarea" id="c-notas" placeholder="Condiciones especiales, observaciones..." style="height:56px"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-cliente')">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-cliente">Guardar</button>
    </div>
  </div>
</div>

<script src="../../js/config.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/sidebar.js"></script>
  <script src="../../js/global-search.js"></script>
<script>
  requireAuth();
  initSidebar('clientes');

  async function loadClientes() {
    const tbody = document.getElementById('tabla-clientes');
    try {
      const clientes = await api.clientes.list();
      if (clientes.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--color-text-muted);padding:2rem">Sin clientes aún</td></tr>`;
        return;
      }
      tbody.innerHTML = clientes.map(c => {
        const initials = c.nombre.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
        return `
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div class="user-avatar" style="width:32px;height:32px;font-size:12px">${initials}</div>
                <span style="font-size:13px;font-weight:500">${c.nombre}</span>
              </div>
            </td>
            <td style="font-size:12px;font-family:monospace;color:var(--color-text-muted)">${c.rfc || '—'}</td>
            <td style="font-size:13px">${c.telefono || '—'}</td>
            <td style="font-size:13px;color:var(--color-text-muted)">${c.email || '—'}</td>
            <td style="font-size:13px">${c.total_pedidos}</td>
            <td style="font-size:13px;font-weight:500">${formatMoney(c.total_facturado)}</td>
            <td>
              <div class="flex gap-8">
                <button class="btn btn-ghost btn-sm" onclick="editarCliente('${c.id}')">Editar</button>
                <button class="btn btn-ghost btn-sm" onclick="eliminarCliente('${c.id}')">Borrar</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  document.getElementById('btn-nuevo').addEventListener('click', () => {
    document.getElementById('modal-titulo').textContent = 'Nuevo cliente';
    document.getElementById('cliente-id').value = '';
    ['c-nombre','c-rfc','c-cp','c-telefono','c-email','c-direccion','c-notas'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('c-regimen').value    = '';
    document.getElementById('c-uso-cfdi').value   = 'G03';
    openModal('modal-cliente');
  });

  async function editarCliente(id) {
    try {
      const c = await api.clientes.get(id);
      document.getElementById('modal-titulo').textContent = 'Editar cliente';
      document.getElementById('cliente-id').value = c.id;
      document.getElementById('c-nombre').value    = c.nombre;
      document.getElementById('c-rfc').value       = c.rfc || '';
      document.getElementById('c-cp').value        = c.cp || '';
      document.getElementById('c-regimen').value   = c.regimen_fiscal || '';
      document.getElementById('c-uso-cfdi').value  = c.uso_cfdi || 'G03';
      document.getElementById('c-telefono').value  = c.telefono || '';
      document.getElementById('c-email').value     = c.email || '';
      document.getElementById('c-direccion').value = c.direccion || '';
      document.getElementById('c-notas').value     = c.notas || '';
      openModal('modal-cliente');
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  document.getElementById('btn-guardar-cliente').addEventListener('click', async () => {
    const id = document.getElementById('cliente-id').value;
    const body = {
      nombre:         document.getElementById('c-nombre').value,
      rfc:            document.getElementById('c-rfc').value.toUpperCase() || null,
      cp:             document.getElementById('c-cp').value || null,
      regimen_fiscal: document.getElementById('c-regimen').value || null,
      uso_cfdi:       document.getElementById('c-uso-cfdi').value || 'G03',
      telefono:       document.getElementById('c-telefono').value,
      email:          document.getElementById('c-email').value,
      direccion:      document.getElementById('c-direccion').value,
      notas:          document.getElementById('c-notas').value || null,
    };
    try {
      if (id) {
        await api.clientes.update(id, body);
        showToast('Cliente actualizado');
      } else {
        await api.clientes.create(body);
        showToast('Cliente creado');
      }
      closeModal('modal-cliente');
      loadClientes();
    } catch (err) {
      showToast(err.message, 'error');
    }
  });

  async function eliminarCliente(id) {
    if (!confirm('¿Eliminar este cliente?')) return;
    try {
      await api.clientes.delete(id);
      showToast('Cliente eliminado');
      loadClientes();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  loadClientes();
</script>
</body>
</html>
